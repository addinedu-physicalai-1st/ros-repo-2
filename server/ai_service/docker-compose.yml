version: '3.9'

# ShopPinkki AI Server
#
# 서비스:
#   yolo — TCP:5005 YOLOv8 인형 감지 추론 서버 (채널 F)
#   llm  — REST:8000 자연어 상품 위치 검색 서버 (채널 D)
#
# 실행:
#   cd server/ai_service
#   docker compose up
#
# 환경 변수 (.env 파일 또는 shell export):
#   PG_HOST     (llm 서버용, 기본 host.docker.internal)
#   PG_PORT     (기본 5432)
#   PG_USER     (기본 shoppinkki)
#   PG_PASSWORD (기본 shoppinkki)
#   PG_DATABASE (기본 shoppinkki)

services:
  # YOLO is now running locally on Pinky Pro (NCNN)

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    container_name: shoppinkki_llm
    # macOS Docker Desktop에서는 network_mode: host가 호스트(Mac) 네트워크를
    # 공유하지 않는다. 명시적 포트 매핑 + host.docker.internal로 호스트
    # (postgres, Ollama) 접근.
    ports:
      - "8000:8000"
    environment:
      - PG_HOST=${PG_HOST:-host.docker.internal}
      - PG_PORT=${PG_PORT:-5432}
      - PG_USER=${PG_USER:-shoppinkki}
      - PG_PASSWORD=${PG_PASSWORD:-shoppinkki}
      - PG_DATABASE=${PG_DATABASE:-shoppinkki}
      - HOST=0.0.0.0
      - PORT=8000
      # 호스트의 Ollama에 접속 — host.docker.internal은 Docker Desktop 내장 호스트 DNS
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434/api/generate}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
